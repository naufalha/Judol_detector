# ============================================
# Judol Detector + Pi-hole v6 — Docker Compose
# ============================================
# Cara pakai:
#   1. cp .env.example .env && nano .env
#   2. docker compose up -d
#   3. docker compose logs -f judol-detector
# ============================================

services:
  # ---- Pi-hole v6 ----
  pihole:
    container_name: pihole
    image: pihole/pihole:latest
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "80:80/tcp"       # Web UI
    environment:
      TZ: "Asia/Jakarta"
      FTLCONF_webserver_api_password: ${PIHOLE_PASSWORD}
      FTLCONF_webserver_api_max_sessions: 64
    volumes:
      - pihole_config:/etc/pihole
      - pihole_dnsmasq:/etc/dnsmasq.d
    networks:
      - judol_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "dig", "+short", "+norecurse", "+retry=0", "@127.0.0.1", "pi.hole"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---- Judol Detector ----
  judol-detector:
    container_name: judol-detector
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      # Override: gunakan hostname container pihole
      PIHOLE_URL: http://pihole
      DB_PATH: /app/data/judol_history.db
      REPORTS_DIR: /app/reports
      TZ: "Asia/Jakarta"
    volumes:
      - judol_data:/app/data
      - judol_reports:/app/reports
      - judol_logs:/app/logs
    networks:
      - judol_net
    depends_on:
      pihole:
        condition: service_healthy
    restart: unless-stopped
    # Resource limits untuk Raspberry Pi
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.50"

networks:
  judol_net:
    driver: bridge

volumes:
  pihole_config:
  pihole_dnsmasq:
  judol_data:
  judol_reports:
  judol_logs:
